name: 🎬 Generate Professional Videos

on:
  workflow_dispatch:
    inputs:
      content_type:
        description: 'نوع المحتوى'
        required: true
        default: 'Motivational'
        type: choice
        options:
          - Motivational
          - Educational
          - Story
          - News
          - Tech
          - Lifestyle
      
      main_topic:
        description: 'موضوع الفيديو'
        required: true
        type: string
      
      video_quality:
        description: 'جودة الفيديو'
        required: true
        default: '1080p'
        type: choice
        options:
          - '720p'
          - '1080p'
          - '4K'
      
      languages:
        description: 'اللغات (ar,en,fr)'
        required: true
        default: 'ar,en,fr'
        type: string

env:
  NODE_VERSION: '18'

jobs:
  setup:
    name: 🔧 Setup Environment
    runs-on: ubuntu-latest
    outputs:
      languages: ${{ steps.parse.outputs.languages }}
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🔍 Parse inputs
        id: parse
        run: |
          LANGS="${{ github.event.inputs.languages }}"
          PARSED_LANGS=$(echo "$LANGS" | tr ',' '\n' | sed 's/^/"/;s/$/"/' | paste -sd ',' | sed 's/,/,/g')
          echo "languages=[$PARSED_LANGS]" >> $GITHUB_OUTPUT
          echo "✅ Languages: $LANGS"

  generate-videos:
    name: 🎥 Generate Video - ${{ matrix.language }}
    runs-on: ubuntu-latest
    needs: setup
    strategy:
      matrix:
        language: ${{ fromJson(needs.setup.outputs.languages) }}
      max-parallel: 3
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: 📦 Install dependencies
        run: |
          echo "📥 Installing npm packages..."
          npm install --legacy-peer-deps
          echo "✅ Dependencies installed"
      
      - name: 🎬 Install FFmpeg
        run: |
          echo "📥 Installing FFmpeg..."
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          ffmpeg -version | head -n 1
          echo "✅ FFmpeg installed"
      
      - name: 🔐 Setup environment variables
        run: |
          cat > .env << EOF
          LANGUAGE=${{ matrix.language }}
          CONTENT_TYPE=${{ github.event.inputs.content_type }}
          MAIN_TOPIC=${{ github.event.inputs.main_topic }}
          VIDEO_QUALITY=${{ github.event.inputs.video_quality }}
          GROK_API_KEY=${{ secrets.GROK_API_KEY }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          PIXABAY_API_KEY=${{ secrets.PIXABAY_API_KEY }}
          PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}
          NODE_ENV=production
          DEBUG_MODE=false
          EOF
          echo "✅ Environment variables configured"
      
      - name: 🧪 Test APIs
        continue-on-error: true
        run: |
          echo "🧪 Testing API connections..."
          timeout 30 node scripts/test-apis.mjs || echo "⚠️ API test completed"
      
      - name: 🎬 Generate video content
        id: generate
        run: |
          echo "🎬 Generating video for ${{ matrix.language }}..."
          LANGUAGE=${{ matrix.language }} \
          CONTENT_TYPE="${{ github.event.inputs.content_type }}" \
          MAIN_TOPIC="${{ github.event.inputs.main_topic }}" \
          VIDEO_QUALITY="${{ github.event.inputs.video_quality }}" \
          node scripts/generate-video.mjs
          
          echo "✅ Video generation completed"
          echo "timestamp=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT
      
      - name: 📊 Generate metadata
        run: |
          mkdir -p output
          cat > output/metadata-${{ matrix.language }}.json << EOF
          {
            "language": "${{ matrix.language }}",
            "content_type": "${{ github.event.inputs.content_type }}",
            "topic": "${{ github.event.inputs.main_topic }}",
            "quality": "${{ github.event.inputs.video_quality }}",
            "generated_at": "${{ steps.generate.outputs.timestamp }}",
            "workflow_run": "${{ github.run_id }}"
          }
          EOF
      
      - name: 📤 Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: video-output-${{ matrix.language }}
          path: |
            output/
            logs/
          retention-days: 30
          if-no-files-found: warn
      
      - name: 📝 Create summary
        if: success()
        run: |
          echo "## ✅ Video Generated Successfully" >> $GITHUB_STEP_SUMMARY
          echo "- **Language**: ${{ matrix.language }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Content Type**: ${{ github.event.inputs.content_type }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Topic**: ${{ github.event.inputs.main_topic }}" >> $GITHUB_STEP_SUMMARY
