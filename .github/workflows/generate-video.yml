name: 🎬 Generate Professional Videos

on:
  workflow_dispatch:
    inputs:
      content_type:
        description: 'نوع المحتوى'
        required: true
        default: 'Motivational'
        type: choice
        options:
          - Motivational
          - Educational
          - Story
      
      main_topic:
        description: 'موضوع الفيديو'
        required: true
        type: string
      
      video_quality:
        description: 'جودة الفيديو'
        required: true
        default: '1080p'
        type: choice
        options:
          - '720p'
          - '1080p'
      
      languages:
        description: 'اللغات (ar,en,fr)'
        required: true
        default: 'ar,en,fr'
        type: string

jobs:
  setup:
    name: 🔧 Setup
    runs-on: ubuntu-latest
    outputs:
      languages: ${{ steps.parse.outputs.languages }}
    
    steps:
      - name: 🔍 Parse languages
        id: parse
        run: |
          LANGS="${{ github.event.inputs.languages }}"
          PARSED_LANGS=$(echo "$LANGS" | tr ',' '\n' | sed 's/^/"/;s/$/"/' | paste -sd ',' | sed 's/,/,/g')
          echo "languages=[$PARSED_LANGS]" >> $GITHUB_OUTPUT
          echo "✅ Languages: $LANGS"

  generate:
    name: 🎥 Generate - ${{ matrix.language }}
    runs-on: ubuntu-latest
    needs: setup
    strategy:
      matrix:
        language: ${{ fromJson(needs.setup.outputs.languages) }}
      max-parallel: 3
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      
      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: 📦 Install dependencies
        run: npm install
      
      - name: 🎬 Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          ffmpeg -version | head -n 1
      
      - name: 🔐 Setup .env
        run: |
          cat > .env << EOF
          LANGUAGE=${{ matrix.language }}
          CONTENT_TYPE=${{ github.event.inputs.content_type }}
          MAIN_TOPIC=${{ github.event.inputs.main_topic }}
          VIDEO_QUALITY=${{ github.event.inputs.video_quality }}
          GROK_API_KEY=${{ secrets.GROK_API_KEY }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          PIXABAY_API_KEY=${{ secrets.PIXABAY_API_KEY }}
          NODE_ENV=production
          DEBUG_MODE=false
          EOF
      
      - name: 🧪 Test APIs
        continue-on-error: true
        run: timeout 30 node scripts/test-apis.mjs || true
      
      - name: 🎬 Generate video
        run: |
          LANGUAGE=${{ matrix.language }} \
          CONTENT_TYPE="${{ github.event.inputs.content_type }}" \
          MAIN_TOPIC="${{ github.event.inputs.main_topic }}" \
          node scripts/generate-video.mjs
      
      - name: 📤 Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: video-${{ matrix.language }}
          path: |
            output/
            logs/
          retention-days: 30

  finalize:
    name: ✨ Done
    runs-on: ubuntu-latest
    needs: generate
    if: always()
    
    steps:
      - name: 📥 Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: outputs
      
      - name: ✅ Success
        run: |
          echo "════════════════════════════════════════"
          echo "✅ All videos generated successfully!"
          echo "════════════════════════════════════════"
          echo "📊 Check artifacts for output files"
          echo "════════════════════════════════════════"
