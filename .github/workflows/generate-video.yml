name: 🎬 Generate Professional Videos

on:
  workflow_dispatch:
    inputs:
      content_type:
        description: 'نوع المحتوى (Motivational/Educational/Story/News/Tech/Lifestyle)'
        required: true
        default: 'Motivational'
        type: choice
        options:
          - Motivational
          - Educational
          - Story
          - News
          - Tech
          - Lifestyle
      
      main_topic:
        description: 'موضوع الفيديو (مثال: النجاح والإصرار)'
        required: true
        type: string
      
      video_quality:
        description: 'جودة الفيديو'
        required: true
        default: '1080p'
        type: choice
        options:
          - '720p'
          - '1080p'
          - '4K'
      
      languages:
        description: 'اللغات المطلوبة'
        required: true
        default: 'ar,en,fr'
        type: string

env:
  NODE_VERSION: '18'
  FFMPEG_VERSION: '8.1.1'

jobs:
  setup:
    name: 🔧 Setup Environment
    runs-on: ubuntu-latest
    outputs:
      languages: ${{ steps.parse.outputs.languages }}
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🔍 Parse inputs
        id: parse
        run: |
          LANGS="${{ github.event.inputs.languages }}"
          echo "languages=${LANGS//,/ }" >> $GITHUB_OUTPUT
          echo "✅ Languages: ${LANGS//,/ }"
      
      - name: 📋 Display Configuration
        run: |
          echo "════════════════════════════════════════"
          echo "🎬 Video Generation Configuration"
          echo "════════════════════════════════════════"
          echo "📝 Content Type: ${{ github.event.inputs.content_type }}"
          echo "🎯 Topic: ${{ github.event.inputs.main_topic }}"
          echo "📺 Quality: ${{ github.event.inputs.video_quality }}"
          echo "🌍 Languages: ${{ github.event.inputs.languages }}"
          echo "════════════════════════════════════════"

  generate-videos:
    name: 🎥 Generate Video - ${{ matrix.language }}
    runs-on: ubuntu-latest
    needs: setup
    strategy:
      matrix:
        language: ${{ fromJson(format('[{0}]', format('"{0}"', join(split(needs.setup.outputs.languages, ' '), '","')))) }}
      max-parallel: 3
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: 📦 Install dependencies
        run: |
          echo "📥 Installing npm packages..."
          npm install --legacy-peer-deps
          echo "✅ Dependencies installed"
      
      - name: 🎬 Install FFmpeg
        run: |
          echo "📥 Installing FFmpeg ${{ env.FFMPEG_VERSION }}..."
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          ffmpeg -version | head -n 1
          echo "✅ FFmpeg installed"
      
      - name: 🔐 Setup environment variables
        run: |
          cat > .env << EOF
          LANGUAGE=${{ matrix.language }}
          CONTENT_TYPE=${{ github.event.inputs.content_type }}
          MAIN_TOPIC=${{ github.event.inputs.main_topic }}
          VIDEO_QUALITY=${{ github.event.inputs.video_quality }}
          GROK_API_KEY=${{ secrets.GROK_API_KEY }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          PIXABAY_API_KEY=${{ secrets.PIXABAY_API_KEY }}
          PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}
          NODE_ENV=production
          DEBUG_MODE=false
          EOF
          echo "✅ Environment variables configured"
      
      - name: 🧪 Test APIs
        run: |
          echo "🧪 Testing API connections..."
          node scripts/test-apis.mjs || echo "⚠️ Some APIs may need verification"
      
      - name: 🎬 Generate video content
        id: generate
        run: |
          echo "🎬 Generating video for ${{ matrix.language }}..."
          LANGUAGE=${{ matrix.language }} \
          CONTENT_TYPE="${{ github.event.inputs.content_type }}" \
          MAIN_TOPIC="${{ github.event.inputs.main_topic }}" \
          VIDEO_QUALITY="${{ github.event.inputs.video_quality }}" \
          node scripts/generate-video.mjs
          
          echo "✅ Video generation completed"
          echo "timestamp=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT
      
      - name: 📊 Generate metadata
        run: |
          cat > output/metadata-${{ matrix.language }}.json << EOF
          {
            "language": "${{ matrix.language }}",
            "content_type": "${{ github.event.inputs.content_type }}",
            "topic": "${{ github.event.inputs.main_topic }}",
            "quality": "${{ github.event.inputs.video_quality }}",
            "generated_at": "${{ steps.generate.outputs.timestamp }}",
            "workflow_run": "${{ github.run_id }}",
            "commit_sha": "${{ github.sha }}"
          }
          EOF
          echo "✅ Metadata generated"
      
      - name: 📤 Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: video-output-${{ matrix.language }}
          path: |
            output/
            logs/
          retention-days: 30
          if-no-files-found: warn
      
      - name: 📝 Create summary
        if: success()
        run: |
          echo "## ✅ Video Generated Successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📋 Details" >> $GITHUB_STEP_SUMMARY
          echo "- **Language**: ${{ matrix.language }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Content Type**: ${{ github.event.inputs.content_type }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Topic**: ${{ github.event.inputs.main_topic }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Quality**: ${{ github.event.inputs.video_quality }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Generated At**: ${{ steps.generate.outputs.timestamp }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📁 Output Files" >> $GITHUB_STEP_SUMMARY
          echo "- \`output/input-props-${{ matrix.language }}.json\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`output/audio-${{ matrix.language }}.wav\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`output/metadata-${{ matrix.language }}.json\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`logs/\`" >> $GITHUB_STEP_SUMMARY
      
      - name: ❌ Error handling
        if: failure()
        run: |
          echo "## ❌ Video Generation Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔍 Troubleshooting" >> $GITHUB_STEP_SUMMARY
          echo "1. Check API keys in GitHub Secrets" >> $GITHUB_STEP_SUMMARY
          echo "2. Verify API quotas and limits" >> $GITHUB_STEP_SUMMARY
          echo "3. Check logs in artifacts" >> $GITHUB_STEP_SUMMARY
          echo "4. Ensure all dependencies are installed" >> $GITHUB_STEP_SUMMARY

  finalize:
    name: ✨ Finalize
    runs-on: ubuntu-latest
    needs: generate-videos
    if: always()
    
    steps:
      - name: 📥 Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-outputs
      
      - name: 📊 Generate final report
        run: |
          echo "## 🎬 Video Generation Report" > REPORT.md
          echo "" >> REPORT.md
          echo "**Workflow Run**: [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> REPORT.md
          echo "**Timestamp**: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> REPORT.md
          echo "" >> REPORT.md
          echo "### 📋 Configuration" >> REPORT.md
          echo "- Content Type: ${{ github.event.inputs.content_type }}" >> REPORT.md
          echo "- Topic: ${{ github.event.inputs.main_topic }}" >> REPORT.md
          echo "- Quality: ${{ github.event.inputs.video_quality }}" >> REPORT.md
          echo "- Languages: ${{ github.event.inputs.languages }}" >> REPORT.md
          echo "" >> REPORT.md
          echo "### 📁 Generated Files" >> REPORT.md
          echo "\`\`\`" >> REPORT.md
          find all-outputs -type f -name "*.json" -o -name "*.wav" | sort >> REPORT.md
          echo "\`\`\`" >> REPORT.md
          cat REPORT.md
      
      - name: 📤 Upload final report
        uses: actions/upload-artifact@v4
        with:
          name: generation-report
          path: REPORT.md
          retention-days: 90
      
      - name: ✅ Success notification
        if: success()
        run: |
          echo "════════════════════════════════════════"
          echo "✅ All videos generated successfully!"
          echo "════════════════════════════════════════"
          echo "📊 Check artifacts for output files"
          echo "📝 Check logs for detailed information"
          echo "════════════════════════════════════════"
      
      - name: ⚠️ Partial failure notification
        if: failure()
        run: |
          echo "════════════════════════════════════════"
          echo "⚠️ Some videos failed to generate"
          echo "════════════════════════════════════════"
          echo "🔍 Check logs for error details"
          echo "📋 Review API configuration"
          echo "════════════════════════════════════════"
