name: 🎬 Generate Professional Videos

on:
  workflow_dispatch:
    inputs:
      content_type:
        description: 'نوع المحتوى'
        required: true
        default: 'Motivational'
        type: choice
        options:
          - Motivational
          - Educational
          - Story
          - News
          - Tech
          - Lifestyle
      main_topic:
        description: 'موضوع الفيديو'
        required: true
        type: string
      video_quality:
        description: 'جودة الفيديو'
        required: true
        default: '1080p'
        type: choice
        options:
          - '720p'
          - '1080p'
          - '4K'
      languages:
        description: 'اللغات (ar,en,fr)'
        required: true
        default: 'ar,en,fr'
        type: string

env:
  NODE_VERSION: '18'

jobs:
  # ============================================
  # Job 1: إنشاء package-lock.json
  # ============================================
  create-lockfile:
    name: 🔒 Create package-lock.json
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 🔍 Check if package-lock.json exists
        id: check
        run: |
          if [ -f package-lock.json ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "✅ package-lock.json موجود"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "⚠️ package-lock.json غير موجود - سيتم إنشاؤه"
          fi

      - name: 📦 Create package-lock.json
        if: steps.check.outputs.exists == 'false'
        run: |
          echo "📥 جاري إنشاء package-lock.json..."
          npm install --legacy-peer-deps
          echo "✅ تم إنشاء package-lock.json"
          echo "📋 الحجم: $(wc -l < package-lock.json) سطر"

      - name: 💾 Push package-lock.json to repo
        if: steps.check.outputs.exists == 'false'
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git commit -m "🔒 auto: add package-lock.json [skip ci]"
          git push
          echo "✅ تم رفع package-lock.json إلى الـ repo"

  # ============================================
  # Job 2: توليد جميع الفيديوهات - طلب واحد لـ 3 لغات
  # ============================================
  generate-all:
    name: 🎬 Generate All Languages
    runs-on: ubuntu-latest
    needs: create-lockfile

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: 📦 Install dependencies
        run: |
          echo "📥 Installing packages..."
          npm ci
          echo "✅ Dependencies installed"
          npm list --depth=0

      - name: 🎬 Install FFmpeg
        run: |
          echo "📥 Installing FFmpeg..."
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          ffmpeg -version | head -n 1
          echo "✅ FFmpeg installed"

      - name: 📁 Create directories
        run: |
          mkdir -p output logs
          echo "✅ Directories created"

      - name: 🔐 Setup environment
        run: |
          cat > .env << EOF
          LANGUAGES=${{ github.event.inputs.languages }}
          CONTENT_TYPE=${{ github.event.inputs.content_type }}
          MAIN_TOPIC=${{ github.event.inputs.main_topic }}
          VIDEO_QUALITY=${{ github.event.inputs.video_quality }}
          GEMINI_API_KEY_1=${{ secrets.GEMINI_API_KEY_1 }}
          GEMINI_API_KEY_2=${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_URL=https://generativelanguage.googleapis.com/v1beta
          GEMINI_TEXT_MODELS=gemini-2.0-flash,gemini-2.0-flash-lite
          GEMINI_TTS_MODEL=gemini-2.5-flash-preview-tts
          PIXABAY_API_KEY=${{ secrets.PIXABAY_API_KEY }}
          PIXABAY_API_URL=https://pixabay.com/api/videos/
          PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}
          PEXELS_API_URL=https://api.pexels.com/videos/search
          NODE_ENV=production
          DEBUG_MODE=false
          LOG_TO_FILE=true
          EOF
          echo "✅ Environment configured"

      - name: 🧪 Test APIs
        env:
          GEMINI_API_KEY_1: ${{ secrets.GEMINI_API_KEY_1 }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
        run: |
          echo "🧪 Testing API connections..."
          node scripts/test-apis.mjs || echo "⚠️ Some APIs may need verification"

      - name: 🎬 Generate - Arabic (ar)
        if: contains(github.event.inputs.languages, 'ar')
        id: generate_ar
        env:
          LANGUAGE: ar
          CONTENT_TYPE: ${{ github.event.inputs.content_type }}
          MAIN_TOPIC: ${{ github.event.inputs.main_topic }}
          VIDEO_QUALITY: ${{ github.event.inputs.video_quality }}
          GEMINI_API_KEY_1: ${{ secrets.GEMINI_API_KEY_1 }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_URL: https://generativelanguage.googleapis.com/v1beta
          GEMINI_TEXT_MODELS: gemini-2.0-flash,gemini-2.0-flash-lite
          GEMINI_TTS_MODEL: gemini-2.5-flash-preview-tts
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          NODE_ENV: production
        run: |
          echo "🎬 Generating Arabic video..."
          node scripts/generate-video.mjs
          echo "✅ Arabic done"

      - name: ⏳ Wait between languages
        run: |
          echo "⏳ انتظار 30s بين اللغات..."
          sleep 30

      - name: 🎬 Generate - English (en)
        if: contains(github.event.inputs.languages, 'en')
        id: generate_en
        env:
          LANGUAGE: en
          CONTENT_TYPE: ${{ github.event.inputs.content_type }}
          MAIN_TOPIC: ${{ github.event.inputs.main_topic }}
          VIDEO_QUALITY: ${{ github.event.inputs.video_quality }}
          GEMINI_API_KEY_1: ${{ secrets.GEMINI_API_KEY_1 }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_URL: https://generativelanguage.googleapis.com/v1beta
          GEMINI_TEXT_MODELS: gemini-2.0-flash,gemini-2.0-flash-lite
          GEMINI_TTS_MODEL: gemini-2.5-flash-preview-tts
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          NODE_ENV: production
        run: |
          echo "🎬 Generating English video..."
          node scripts/generate-video.mjs
          echo "✅ English done"

      - name: ⏳ Wait between languages
        run: |
          echo "⏳ انتظار 30s بين اللغات..."
          sleep 30

      - name: 🎬 Generate - French (fr)
        if: contains(github.event.inputs.languages, 'fr')
        id: generate_fr
        env:
          LANGUAGE: fr
          CONTENT_TYPE: ${{ github.event.inputs.content_type }}
          MAIN_TOPIC: ${{ github.event.inputs.main_topic }}
          VIDEO_QUALITY: ${{ github.event.inputs.video_quality }}
          GEMINI_API_KEY_1: ${{ secrets.GEMINI_API_KEY_1 }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_URL: https://generativelanguage.googleapis.com/v1beta
          GEMINI_TEXT_MODELS: gemini-2.0-flash,gemini-2.0-flash-lite
          GEMINI_TTS_MODEL: gemini-2.5-flash-preview-tts
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          NODE_ENV: production
        run: |
          echo "🎬 Generating French video..."
          node scripts/generate-video.mjs
          echo "✅ French done"

      - name: 📊 Generate metadata
        run: |
          TIMESTAMP=$(date -u +'%Y-%m-%dT%H:%M:%SZ')

          for LANG in $(echo "${{ github.event.inputs.languages }}" | tr ',' ' '); do
            cat > output/metadata-${LANG}.json << EOF
          {
            "language"    : "${LANG}",
            "content_type": "${{ github.event.inputs.content_type }}",
            "topic"       : "${{ github.event.inputs.main_topic }}",
            "quality"     : "${{ github.event.inputs.video_quality }}",
            "generated_at": "${TIMESTAMP}",
            "workflow_run": "${{ github.run_id }}",
            "commit_sha"  : "${{ github.sha }}",
            "method"      : "single_request_3_languages"
          }
          EOF
            echo "✅ Metadata: ${LANG}"
          done

      - name: 📤 Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: video-outputs-all
          path: |
            output/
            logs/
          retention-days: 30
          if-no-files-found: warn

      - name: 📝 Success summary
        if: success()
        run: |
          echo "## ✅ تم التوليد بنجاح"                                                     >> $GITHUB_STEP_SUMMARY
          echo ""                                                                             >> $GITHUB_STEP_SUMMARY
          echo "### 📋 التفاصيل"                                                             >> $GITHUB_STEP_SUMMARY
          echo "- **النوع**   : ${{ github.event.inputs.content_type }}"                    >> $GITHUB_STEP_SUMMARY
          echo "- **الموضوع** : ${{ github.event.inputs.main_topic }}"                      >> $GITHUB_STEP_SUMMARY
          echo "- **الجودة**  : ${{ github.event.inputs.video_quality }}"                   >> $GITHUB_STEP_SUMMARY
          echo "- **اللغات**  : ${{ github.event.inputs.languages }}"                       >> $GITHUB_STEP_SUMMARY
          echo "- **الطريقة** : طلب Gemini واحد → 3 لغات"                                   >> $GITHUB_STEP_SUMMARY
          echo ""                                                                             >> $GITHUB_STEP_SUMMARY
          echo "### 📁 الملفات"                                                              >> $GITHUB_STEP_SUMMARY
          echo "- \`output/input-props-ar.json\`"                                            >> $GITHUB_STEP_SUMMARY
          echo "- \`output/input-props-en.json\`"                                            >> $GITHUB_STEP_SUMMARY
          echo "- \`output/input-props-fr.json\`"                                            >> $GITHUB_STEP_SUMMARY
          echo "- \`output/audio-ar.wav\`"                                                   >> $GITHUB_STEP_SUMMARY
          echo "- \`output/audio-en.wav\`"                                                   >> $GITHUB_STEP_SUMMARY
          echo "- \`output/audio-fr.wav\`"                                                   >> $GITHUB_STEP_SUMMARY

      - name: ❌ Failure summary
        if: failure()
        run: |
          echo "## ❌ فشل التوليد"                                    >> $GITHUB_STEP_SUMMARY
          echo ""                                                      >> $GITHUB_STEP_SUMMARY
          echo "### 🔍 خطوات الإصلاح"                                 >> $GITHUB_STEP_SUMMARY
          echo "1. تحقق من GEMINI_API_KEY_1 في GitHub Secrets"        >> $GITHUB_STEP_SUMMARY
          echo "2. تحقق من GEMINI_API_KEY_2 في GitHub Secrets"        >> $GITHUB_STEP_SUMMARY
          echo "3. تحقق من PIXABAY_API_KEY في GitHub Secrets"         >> $GITHUB_STEP_SUMMARY
          echo "4. راجع الـ logs في الـ artifacts"                    >> $GITHUB_STEP_SUMMARY
          echo "5. تجاوز الحصة؟ انتظر وأعد المحاولة"                 >> $GITHUB_STEP_SUMMARY

  # ============================================
  # Job 3: التجميع النهائي
  # ============================================
  finalize:
    name: ✨ Finalize
    runs-on: ubuntu-latest
    needs: generate-all
    if: always()

    steps:
      - name: 📥 Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-outputs

      - name: 📊 Generate final report
        run: |
          echo "## 🎬 تقرير التوليد النهائي"                                                                                                 >> $GITHUB_STEP_SUMMARY
          echo ""                                                                                                                              >> $GITHUB_STEP_SUMMARY
          echo "**Workflow Run**: [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
          echo "**Timestamp**: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"                                                                          >> $GITHUB_STEP_SUMMARY
          echo ""                                                                                                                              >> $GITHUB_STEP_SUMMARY
          echo "### 📋 الإعدادات"                                                                                                             >> $GITHUB_STEP_SUMMARY
          echo "- النوع    : ${{ github.event.inputs.content_type }}"                                                                         >> $GITHUB_STEP_SUMMARY
          echo "- الموضوع  : ${{ github.event.inputs.main_topic }}"                                                                           >> $GITHUB_STEP_SUMMARY
          echo "- الجودة   : ${{ github.event.inputs.video_quality }}"                                                                        >> $GITHUB_STEP_SUMMARY
          echo "- اللغات   : ${{ github.event.inputs.languages }}"                                                                            >> $GITHUB_STEP_SUMMARY
          echo "- الطريقة  : طلب Gemini واحد → 3 لغات + 3 أصوات"                                                                           >> $GITHUB_STEP_SUMMARY
          echo ""                                                                                                                              >> $GITHUB_STEP_SUMMARY
          echo "### 📁 الملفات المولدة"                                                                                                       >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`"                                                                                                                        >> $GITHUB_STEP_SUMMARY
          find all-outputs -type f | sort                                                                                                      >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`"                                                                                                                        >> $GITHUB_STEP_SUMMARY

      - name: 📤 Upload final report
        uses: actions/upload-artifact@v4
        with:
          name: generation-report
          path: all-outputs/
          retention-days: 90

      - name: ✅ Success notification
        if: success()
        run: |
          echo "════════════════════════════════════════"
          echo "✅ تم توليد جميع الفيديوهات بنجاح!"
          echo "════════════════════════════════════════"
          echo "🤖 النصوص : Gemini (طلب واحد - 3 لغات)"
          echo "🎙️  الصوت  : Gemini TTS × 3 لغات"
          echo "📊 راجع الـ artifacts للملفات"
          echo "════════════════════════════════════════"

      - name: ⚠️ Failure notification
        if: failure()
        run: |
          echo "════════════════════════════════════════"
          echo "⚠️ فشل بعض الفيديوهات"
          echo "════════════════════════════════════════"
          echo "🔍 راجع الـ logs للتفاصيل"
          echo "📋 تحقق من GitHub Secrets:"
          echo "   - GEMINI_API_KEY_1 (للنصوص)"
          echo "   - GEMINI_API_KEY_2 (للصوت)"
          echo "   - PIXABAY_API_KEY"
          echo "════════════════════════════════════════"
